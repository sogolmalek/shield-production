function getScore(addr) {
  let h = 0;
  for (let i = 0; i < addr.length; i++) h = ((h << 5) - h + addr.charCodeAt(i)) | 0;
  const s = Math.abs(h);
  const mintOk = (s % 7) !== 0, freezeOk = (s % 5) !== 0, lpOk = (s % 4) !== 0;
  const topH = 5 + (s % 60), devW = s % 35, honey = (s % 13) === 0;
  const liq = 1000 + (s % 5000000), age = 1 + (s % 720);
  let sc = 50;
  if (mintOk) sc += 15; else sc -= 25;
  if (freezeOk) sc += 10; else sc -= 20;
  if (lpOk) sc += 12; else sc -= 15;
  if (topH < 15) sc += 10; else if (topH > 40) sc -= 15;
  if (devW < 5) sc += 8; else if (devW > 20) sc -= 20;
  if (honey) sc -= 40;
  if (liq > 100000) sc += 5;
  if (age > 168) sc += 5;
  sc = Math.max(0, Math.min(100, sc));
  return {
    score: sc,
    tier: sc >= 70 ? "safe" : sc >= 50 ? "caution" : sc >= 30 ? "warning" : "danger",
    verdict: sc >= 70 ? "Low Risk" : sc >= 50 ? "Moderate" : sc >= 30 ? "High Risk" : "Extreme Risk",
    checks: [
      { name: "Mint Authority", ok: mintOk, val: mintOk ? "Revoked" : "Active" },
      { name: "Freeze Authority", ok: freezeOk, val: freezeOk ? "Revoked" : "Active" },
      { name: "LP Lock", ok: lpOk, val: lpOk ? "Locked" : "Unlocked" },
      { name: "Top Holder", ok: topH < 25, warn: topH >= 25 && topH < 40, val: topH + "%" },
      { name: "Dev Wallet", ok: devW < 10, warn: devW >= 10 && devW < 20, val: devW + "%" },
      { name: "Honeypot", ok: !honey, val: honey ? "Detected" : "Clean" },
      { name: "Liquidity", ok: liq > 50000, warn: liq >= 10000 && liq < 50000, val: "$" + (liq >= 1e6 ? (liq/1e6).toFixed(1)+"M" : (liq/1e3).toFixed(0)+"K") },
      { name: "Token Age", ok: age > 72, warn: age >= 24 && age < 72, val: age > 48 ? Math.floor(age/24)+"d" : age+"h" },
    ]
  };
}

function ScorePill({ score, tier, size = "sm", onClick }) {
  const sizes = { sm: { fs: 11, px: 7, py: 2, dot: 5, gap: 4 }, md: { fs: 13, px: 10, py: 4, dot: 6, gap: 5 } };
  const s = sizes[size];
  return (
    <button onClick={onClick} style={{
      display: "inline-flex", alignItems: "center", gap: s.gap,
      padding: `${s.py}px ${s.px}px`, borderRadius: 6,
      background: tierBg[tier], border: `1px solid ${tierC[tier]}18`,
      color: tierC[tier], fontSize: s.fs, fontWeight: 600,
      cursor: onClick ? "pointer" : "default", fontFamily: "inherit",
      transition: "all 0.2s ease",
    }}
    onMouseEnter={e => { if(onClick) { e.currentTarget.style.boxShadow = `0 0 16px ${tierC[tier]}20`; e.currentTarget.style.borderColor = `${tierC[tier]}30`; }}}
    onMouseLeave={e => { e.currentTarget.style.boxShadow = "none"; e.currentTarget.style.borderColor = `${tierC[tier]}18`; }}
    >
      <span style={{ width: s.dot, height: s.dot, borderRadius: "50%", background: tierC[tier] }} />
      {score}
    </button>
  );
}

      </div>
    </div>
  );
}

function BusinessView() {
  const [day, setDay] = useState(0);
  useEffect(() => { const t = setInterval(() => setDay(d => Math.min(d + 1, 30)), 120); return () => clearInterval(t); }, []);

  const dailyScans = [0, 1200, 3400, 5800, 8200, 14000, 19000, 28000, 42000, 58000, 71000, 89000, 110000, 135000, 158000, 180000, 210000, 245000, 280000, 320000, 370000, 420000, 480000, 550000, 620000, 710000, 800000, 900000, 1020000, 1150000, 1300000];
  const totalScans = dailyScans.slice(0, day + 1).reduce((a, b) => a + b, 0);
  const revenue = totalScans * 0.01;
  const commission = revenue * 0.20;
  const maxVal = Math.max(...dailyScans.slice(0, day + 1));

  return (
    <div style={{ padding: "20px 20px" }}>
      {/* Revenue overview */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
        {[
          { label: "Total Scans", value: totalScans >= 1e6 ? (totalScans/1e6).toFixed(1)+"M" : totalScans >= 1e3 ? (totalScans/1e3).toFixed(0)+"K" : totalScans, color: C.safe },
          { label: "Gross Revenue", value: "$" + (revenue >= 1000 ? (revenue/1000).toFixed(1)+"K" : revenue.toFixed(0)), color: C.accent },
          { label: "Your Commission (20%)", value: "$" + (commission >= 1000 ? (commission/1000).toFixed(1)+"K" : commission.toFixed(0)), color: "#F472B6" },
        ].map((s, i) => (
          <div key={i} style={{ background: C.surface, borderRadius: 12, border: `1px solid ${C.border}`, padding: 14 }}>
            <div style={{ fontSize: 9, color: C.textDim, textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 6 }}>{s.label}</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: s.color }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Chart */}
      <div style={{ background: C.surface, borderRadius: 12, border: `1px solid ${C.border}`, padding: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 12 }}>Daily Scan Volume — Day {day}/30</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 2, height: 100 }}>
          {dailyScans.slice(0, day + 1).map((v, i) => (
            <div key={i} style={{
              flex: 1, borderRadius: "3px 3px 0 0",
              height: maxVal > 0 ? Math.max(2, (v / maxVal) * 100) : 2,
              background: `linear-gradient(180deg, ${C.safe}, ${C.safe}40)`,
              transition: "height 0.3s ease",
            }} />
          ))}
        </div>
      </div>

      {/* Business model */}
      <div style={{ background: C.surface, borderRadius: 12, border: `1px solid ${C.border}`, padding: 16 }}>
        <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 14 }}>x402 Revenue Model</div>
        {[
          { icon: "👤", label: "User scans token", flow: "→  $0.01 USDC via x402" },
          { icon: "⛨", label: "SHIELD processes", flow: "→  On-chain data + AI scoring" },
          { icon: "💰", label: "Revenue split", flow: "→  80% data providers · 20% SHIELD" },
          { icon: "⚡", label: "Settlement", flow: "→  Instant on Solana (~400ms)" },
        ].map((r, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < 3 ? `1px solid ${C.border}` : "none" }}>
            <span style={{ fontSize: 16, width: 32, height: 32, borderRadius: 8, background: "rgba(255,255,255,0.03)", display: "flex", alignItems: "center", justifyContent: "center" }}>{r.icon}</span>
            <div>
              <div style={{ fontSize: 12, fontWeight: 500 }}>{r.label}</div>
              <div style={{ fontSize: 11, color: C.textMuted }}>{r.flow}</div>
            </div>
          </div>
        ))}

        <div style={{ marginTop: 14, padding: 12, borderRadius: 10, background: C.accentBg, border: `1px solid ${C.accent}15` }}>
          <div style={{ fontSize: 10, color: C.accent, fontWeight: 600, marginBottom: 6 }}>Scale Projection</div>
          <div style={{ fontSize: 11, color: C.textMuted, lineHeight: 1.6 }}>
            Solana averages <strong style={{ color: C.text }}>~2M token trades/day</strong>. 
            If 5% of traders use Shield = <strong style={{ color: C.text }}>100K scans/day</strong> = 
            <strong style={{ color: C.safe }}> $1,000/day gross</strong>. 
            Your 20% commission = <strong style={{ color: "#F472B6" }}>$200/day → $73K/year</strong>.
            At 20% adoption → <strong style={{ color: "#F472B6" }}>$292K/year</strong>.
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main ──
function ShieldApp() {
  const [view, setView] = useState("dex");
  const [loaded, setLoaded] = useState([]);
  const [detail, setDetail] = useState(null);
  const [scanCount, setScanCount] = useState(0);

  useEffect(() => {
    TOKENS.forEach((t, i) => {
      setTimeout(() => {
        setLoaded(prev => [...prev, t.addr]);
        setScanCount(prev => prev + 1);
      }, 400 + i * 250);
    });
  }, []);

  const tabs = [
    { id: "dex", label: "Token Scanner", icon: "📊" },
    { id: "twitter", label: "Social Feed", icon: "🐦" },
    { id: "swap", label: "Swap Guard", icon: "🔄" },
    { id: "business", label: "x402 Revenue", icon: "💰" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: 10, background: "rgba(52,211,153,0.1)", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontSize: 18 }}>⛨</span>
          </div>
          <div>
            <span style={{ fontSize: 16, fontWeight: 700, letterSpacing: 1 }}>Shield</span>
            <span style={{ fontSize: 10, color: C.textDim, marginLeft: 8, padding: "2px 6px", background: "rgba(255,255,255,0.04)", borderRadius: 4, fontFamily: "'JetBrains Mono', monospace" }}>v1.0</span>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 10, color: C.textDim }}>Scans</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.safe, fontFamily: "'JetBrains Mono', monospace" }}>{scanCount}</div>
          </div>
          <div style={{ width: 1, height: 24, background: C.border }} />
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 10, color: C.textDim }}>x402 cost</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.accent, fontFamily: "'JetBrains Mono', monospace" }}>${(scanCount * 0.01).toFixed(2)}</div>
          </div>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.safe, boxShadow: `0 0 8px ${C.safe}60` }} />
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "0 12px", overflowX: "auto" }}>
        {tabs.map(tab => (
          <button key={tab.id} onClick={() => setView(tab.id)} style={{
            padding: "12px 14px", background: "none",
            border: "none", borderBottom: `2px solid ${view === tab.id ? C.safe : "transparent"}`,
            color: view === tab.id ? C.text : C.textMuted,
            fontSize: 12, fontWeight: view === tab.id ? 600 : 400,
            cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s",
            display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap",
          }}>
            <span style={{ fontSize: 13 }}>{tab.icon}</span>
            {tab.label}
          </button>
        ))}
      </div>

      {/* Content */}
      {view === "dex" && <DexView tokens={TOKENS} loaded={loaded} onSelect={setDetail} />}
      {view === "twitter" && <TwitterView tokens={TOKENS} loaded={loaded} onSelect={setDetail} />}
      {view === "swap" && <SwapView tokens={TOKENS} loaded={loaded} onSelect={setDetail} />}
      {view === "business" && <BusinessView />}

      {/* Detail drawer */}
      <DetailDrawer data={detail} onClose={() => setDetail(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ShieldApp));
</script>
</body>
</html>
